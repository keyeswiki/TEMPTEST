version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

sphinx:
  configuration: conf.py

python:
    install:
    - requirements: requirements.txt

formats: all

search:
  ranking:
    # Match a single file
    tutorial.html: 2

    # Match all files under the api/v1 directory
    docs/*: -5
    docs/arduino/*: -5
    docs/easyplug/*: -5
    docs/esp32/*: -5
    docs/microbit/*: -5
    docs/raspberrypi/*: -5

    # Match all files named guides.html,
    # two patterns are needed to match both the root and nested files.
    'guides.html': 3
    '*/guides.html': 3


    '*': 3
    '*.html': 3
    '*/*.html': 3







